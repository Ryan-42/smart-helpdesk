<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Helpdesk — Acesso</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box { width: 100%; max-width: 420px; }

    .login-logo {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .logo-icon-lg {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 1.2rem;
      box-shadow: var(--glow-blue);
      animation: pulse-logo 3s ease-in-out infinite;
    }
    .login-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem; font-weight: 700; letter-spacing: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; letter-spacing: 1px;
    }
    .login-sub::before { content: '// '; color: var(--neon-dim); }
    .form-group { margin-bottom: 1.2rem; }
    .login-footer {
      text-align: center; margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px;
    }
    .login-footer span { color: var(--neon-blue); opacity: 0.7; }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 400px; height: 400px; background: rgba(139,92,246,0.12); top: -100px; right: -100px; animation: orbFloat 8s ease-in-out infinite; }
    .orb-2 { width: 300px; height: 300px; background: rgba(0,212,255,0.08); bottom: -80px; left: -80px; animation: orbFloat 10s ease-in-out infinite reverse; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,-20px) scale(1.05); }
    }
  </style>
</head>
<body>
<div class="scanlines"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <div class="login-wrapper">
    <div class="login-box">

      <div class="login-logo">
        <div class="logo-icon-lg">⬡</div>
        <div class="login-title">SMART HELPDESK</div>
        <div class="login-sub">acesso ao sistema de suporte inteligente</div>
      </div>

      <div class="card animate-in delay-2">
        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="loginEmail">Login</label>
            <input type="text" id="loginEmail" placeholder="admin" required>
          </div>
          <div class="form-group">
            <label for="loginSenha">Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" id="loginBtn">
            ⟨ Acessar Sistema ⟩
          </button>
        </form>
        <div id="loginMsg" class="mensagem"></div>
      </div>

      <div class="login-footer">
        <span>SMART HELPDESK</span> &nbsp;·&nbsp; Neural AI v1.0
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:2500/api';

  if (localStorage.getItem('sh_token')) {
    window.location.href = 'dashboard.html';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = (type === 'sucesso' ? '✓  ' : '✗  ') + text;
    el.className = 'mensagem show ' + type;
    setTimeout(() => { el.className = 'mensagem'; }, 5000);
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');

    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erro || 'Erro ao fazer login');

      localStorage.setItem('sh_token', data.token);
      localStorage.setItem('sh_usuario', JSON.stringify(data.usuario));

      showMsg('loginMsg', 'Autenticado! Redirecionando...', 'sucesso');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);

    } catch (err) {
      showMsg('loginMsg', err.message, 'erro');
    } finally {
      btn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
